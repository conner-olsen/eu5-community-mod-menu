<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMM Settings Tool</title>
    <link rel="stylesheet" href="/css/app.css">
    <link rel="stylesheet" href="/css/preview.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <h1 class="app-title">CMM Settings Tool</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" @click="showImport = true">Import</button>
                <button class="btn btn-primary" @click="generateAndDownload" :disabled="!state.mod_id">Download ZIP</button>
            </div>
        </header>

        <div class="app-body">
            <!-- EDITOR PANEL -->
            <div class="editor-panel">
                <mod-editor :state="state" @update="onUpdate"></mod-editor>

                <div class="section">
                    <div class="section-header">
                        <h3>Tabs</h3>
                        <button class="btn btn-sm" @click="addTab">+ Add Tab</button>
                    </div>
                    <div class="tab-bar" v-if="state.tabs.length">
                        <button v-for="(tab, i) in state.tabs" :key="i"
                            class="tab-btn" :class="{active: selectedTabIdx === i}"
                            @click="selectedTabIdx = i">
                            {{ tab.name || tab.tab_id || 'Tab ' + (i+1) }}
                            <span class="tab-remove" @click.stop="removeTab(i)">&times;</span>
                        </button>
                    </div>

                    <div v-if="selectedTab" class="tab-content">
                        <div class="field-row">
                            <label>Tab ID</label>
                            <input v-model="selectedTab.tab_id" placeholder="general" @input="sanitizeId(selectedTab, 'tab_id')">
                        </div>
                        <div class="field-row">
                            <label>Tab Name</label>
                            <input v-model="selectedTab.name" placeholder="General">
                        </div>

                        <div class="section-header" style="margin-top:12px">
                            <h4>Groups</h4>
                            <button class="btn btn-sm" @click="addGroup">+ Add Group</button>
                        </div>

                        <div class="group-bar" v-if="selectedTab.groups.length">
                            <button v-for="(group, gi) in selectedTab.groups" :key="gi"
                                class="group-btn" :class="{active: selectedGroupIdx === gi}"
                                @click="selectedGroupIdx = gi">
                                {{ group.name || group.group_id || 'Group ' + (gi+1) }}
                                <span class="tab-remove" @click.stop="removeGroup(gi)">&times;</span>
                            </button>
                        </div>

                        <div v-if="selectedGroup" class="group-content">
                            <div class="field-row">
                                <label>Group ID</label>
                                <input v-model="selectedGroup.group_id" placeholder="general" @input="sanitizeId(selectedGroup, 'group_id')">
                            </div>
                            <div class="field-row">
                                <label>Group Name</label>
                                <input v-model="selectedGroup.name" placeholder="General">
                            </div>

                            <div class="section-header" style="margin-top:12px">
                                <h4>Settings</h4>
                                <button class="btn btn-sm" @click="addSetting">+ Add Setting</button>
                            </div>

                            <div class="settings-list">
                                <setting-editor v-for="(setting, si) in selectedGroup.settings" :key="si"
                                    :setting="setting" :index="si" :total="selectedGroup.settings.length"
                                    @remove="removeSetting(si)"
                                    @move-up="moveSetting(si, -1)"
                                    @move-down="moveSetting(si, 1)">
                                </setting-editor>
                                <div v-if="!selectedGroup.settings.length" class="empty-state">
                                    No settings yet. Click "+ Add Setting" to create one.
                                </div>
                            </div>
                        </div>
                    </div>
                    <div v-else class="empty-state">
                        No tabs yet. Click "+ Add Tab" to create one.
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL: Preview / Code -->
            <div class="right-panel">
                <div class="right-tabs">
                    <button class="right-tab-btn" :class="{active: rightTab === 'preview'}" @click="rightTab = 'preview'">Preview</button>
                    <button class="right-tab-btn" :class="{active: rightTab === 'code'}" @click="rightTab = 'code'">Code</button>
                    <button class="right-tab-btn" :class="{active: rightTab === 'localization'}" @click="rightTab = 'localization'">Localization</button>
                </div>

                <preview-panel v-if="rightTab === 'preview'" :state="state"></preview-panel>
                <code-panel v-if="rightTab === 'code'" :state="state"></code-panel>
                <localization-panel v-if="rightTab === 'localization'" :state="state"></localization-panel>
            </div>
        </div>

        <!-- Import Modal -->
        <div v-if="showImport" class="modal-overlay" @click.self="showImport = false">
            <div class="modal">
                <h3>Import Existing Mod</h3>
                <div class="field-row">
                    <label>Mod Directory Path</label>
                    <input v-model="importPath" placeholder="C:\path\to\your\mod">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" @click="showImport = false">Cancel</button>
                    <button class="btn btn-primary" @click="importFromDir" :disabled="!importPath">Import</button>
                </div>
                <div v-if="importWarnings.length" class="warnings">
                    <p v-for="w in importWarnings" class="warning">{{ w }}</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/vendor/vue.global.prod.js"></script>
    <script src="/js/generator-preview.js"></script>
    <script src="/js/components/ModEditor.js"></script>
    <script src="/js/components/SettingEditor.js"></script>
    <script src="/js/components/ListEditor.js"></script>
    <script src="/js/components/DropdownOptions.js"></script>
    <script src="/js/components/PreviewPanel.js"></script>
    <script src="/js/components/CodePanel.js"></script>
    <script src="/js/components/LocalizationPanel.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
